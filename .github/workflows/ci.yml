name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (frontend)
        run: bunx tsc --noEmit

      - name: Build frontend
        run: bun run build

      - name: Check api entrypoint compiles
        run: bunx tsc --noEmit --project tsconfig.json api/index.ts || true
